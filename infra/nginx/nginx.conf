worker_processes auto;
events { worker_connections 1024; }

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── HTTP: Let's Encrypt ACME challenge + redirect to HTTPS ───
    server {
        listen 80;
        server_name SIP_DOMAIN_PLACEHOLDER;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS / WSS: SIP over WebSocket Secure ───
    server {
        listen 443 ssl;
        http2 on;
        server_name SIP_DOMAIN_PLACEHOLDER;

        ssl_certificate     /etc/letsencrypt/live/SIP_DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SIP_DOMAIN_PLACEHOLDER/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Health check
        location = /health {
            access_log off;
            return 200 "Xyra Voice SIP gateway online\n";
            add_header Content-Type text/plain;
        }

        # SIP over WebSocket — proxied to Kamailio
        location /ws {
            proxy_pass http://127.0.0.1:8088;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
