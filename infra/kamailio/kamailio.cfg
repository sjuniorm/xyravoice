####### Xyra Voice — Kamailio (Step 4: Trunks via Asterisk) ###########
#
# Routes calls between registered SIP users (browser softphones), and
# forwards anything that doesn't match a local registration to Asterisk
# on 127.0.0.1:5080 for trunk-based PSTN routing.
#
########################################################################

import_file "/etc/kamailio/secrets/kamailio-db.cfg"

#!define WS_PORT 8088
#!define RTPENGINE_SOCK "udp:127.0.0.1:22222"
#!define ASTERISK_ADDR "sip:127.0.0.1:5080"

####### Global Parameters ##########

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=no
children=2  # Keep small to stay within Supavisor pool limits

# Required for xhttp / WebSocket
tcp_accept_no_cl=yes
tcp_connection_lifetime=3604

# Listen on all interfaces
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tcp:0.0.0.0:8088   # Plain WebSocket — Nginx terminates TLS in front

####### Modules Section ##########

mpath="/usr/lib/kamailio/modules/"

# Core
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"

# Database
loadmodule "db_postgres.so"

# Auth
loadmodule "auth.so"
loadmodule "auth_db.so"

# Registration / location
loadmodule "usrloc.so"
loadmodule "registrar.so"

# Dialog management & relay
loadmodule "dialog.so"

# WebSocket / HTTP
loadmodule "xhttp.so"
loadmodule "websocket.so"

# NAT / RTP
loadmodule "nathelper.so"
loadmodule "rtpengine.so"

####### Module Parameters ##########

# Routing
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

# usrloc — keep registrations in memory only
modparam("usrloc", "db_mode", 0)
modparam("usrloc", "nat_bflag", 7)

# registrar
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "default_expires", 3600)
modparam("registrar", "received_avp", "$avp(received_uri)")

# auth_db
modparam("auth_db", "db_url", DBURL)
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "use_domain", 0)
modparam("auth_db", "user_column", "sip_username")
modparam("auth_db", "password_column", "sip_password")
modparam("auth_db", "load_credentials", "")

# rtpengine
modparam("rtpengine", "rtpengine_sock", RTPENGINE_SOCK)
modparam("rtpengine", "extra_id_pv", "$avp(extra_id)")

# nathelper
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)
modparam("nathelper", "sipping_from", "sip:pinger@sip.xyrachat.com")
modparam("nathelper", "received_avp", "$avp(received_uri)")

####### Routing Logic ##########

request_route {
    # ─── Sanity ───
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp\n");
        exit;
    }

    # ─── Health checks ───
    if (is_method("OPTIONS") && uri == myself) {
        sl_send_reply("200", "Xyra Voice — Kamailio Online");
        exit;
    }

    # ─── In-dialog requests (BYE, ACK, re-INVITE, etc.) ───
    if (has_totag()) {
        if (loose_route()) {
            # Release rtpengine resources when the call ends
            if (is_method("BYE")) {
                rtpengine_delete();
            }
            route(RELAY);
            exit;
        }
        sl_send_reply("404", "Not here");
        exit;
    }

    # CANCEL — handled by tm
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # ─── REGISTER ───
    if (is_method("REGISTER")) {
        if (!auth_check("$fd", "sip_users", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        consume_credentials();

        # Mark contacts behind NAT (most browsers are)
        if (nat_uac_test("19")) {
            fix_nated_register();
            setbflag(7);
        }

        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    # ─── INVITE ───
    if (is_method("INVITE")) {
        # ── Calls coming back FROM Asterisk (inbound PSTN) ──
        # Asterisk lives on 127.0.0.1:5080. When it sends an INVITE here,
        # the request URI's user is the destination extension's globally-
        # unique SIP username (e.g. t_abc123_101). We just look it up and
        # relay — no auth needed (loopback only).
        if (src_ip == 127.0.0.1 && src_port == 5080) {
            xlog("L_INFO", "INVITE from Asterisk: -> $rU\n");
            if (!lookup("location")) {
                sl_send_reply("404", "Inbound destination not registered");
                exit;
            }
            record_route();
            route(NATMANAGE);
            # Originator is asterisk → answers must be plain RTP.
            # Callee is browser → offer is WebRTC.
            setbflag(9);  # bflag 9 = originator is asterisk
            $avp(rtp_dest) = "browser";
            route(RTPENGINE_OFFER);
            route(RELAY);
            exit;
        }

        # ── Calls FROM browsers ──
        # Authenticate caller
        if (!auth_check("$fd", "sip_users", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        consume_credentials();

        record_route();

        # Lookup destination in usrloc — is it a registered local user?
        if (lookup("location")) {
            xlog("L_INFO", "INVITE: $fU -> $rU (local, registered at $du)\n");
            route(NATMANAGE);
            # Both legs are browsers
            $avp(rtp_dest) = "browser";
            route(RTPENGINE_OFFER);
            route(RELAY);
            exit;
        }

        # Not a local registration → send to Asterisk for trunk routing
        xlog("L_INFO", "INVITE: $fU -> $rU (forwarding to Asterisk)\n");
        $du = ASTERISK_ADDR;
        route(NATMANAGE);
        # Callee (asterisk) is plain RTP
        $avp(rtp_dest) = "asterisk";
        route(RTPENGINE_OFFER);
        route(RELAY);
        exit;
    }

    # ─── MESSAGE / SUBSCRIBE / NOTIFY ───
    if (is_method("MESSAGE|SUBSCRIBE|NOTIFY")) {
        if (!auth_check("$fd", "sip_users", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        consume_credentials();

        if (!lookup("location")) {
            sl_send_reply("404", "User not registered");
            exit;
        }

        route(RELAY);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
    exit;
}

# ─── Relay route ───
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# ─── NAT detection / fix-up ───
route[NATMANAGE] {
    if (nat_uac_test("19")) {
        fix_nated_contact();
        setbflag(6);  # mark as NAT
    }
    # Browsers are always WebSocket
    if (proto == WS || proto == WSS) {
        setbflag(8);  # mark as WebRTC
    }
}

# ─── rtpengine: rewrite SDP for media bridging ───
#
# rtpengine_offer flags describe how the SDP is rewritten BEFORE it's
# forwarded to the answerer. So the right flag set depends on what the
# *answerer* speaks:
#
#   $avp(rtp_dest) == "browser"   → answerer speaks WebRTC (DTLS-SRTP/ICE)
#   $avp(rtp_dest) == "asterisk"  → answerer speaks plain RTP/AVP
#
# rtpengine remembers the dialog and rtpengine_answer() in onreply_route
# automatically uses the inverse direction (offerer's transport).
route[RTPENGINE_OFFER] {
    if ($avp(rtp_dest) == "asterisk") {
        rtpengine_offer("trust-address replace-origin replace-session-connection RTP/AVP ICE=remove rtcp-mux-demux");
    } else {
        # DTLS=passive — rtpengine acts as DTLS server for the browser.
        # Without this the browser can't complete the SRTP handshake on
        # inbound calls, causing one-way / no audio.
        rtpengine_offer("trust-address replace-origin replace-session-connection ICE=force RTP/SAVPF rtcp-mux-offer rtcp-mux-require DTLS=passive");
    }
}

# Replies to outgoing INVITEs — fix NAT and bridge media.
#
# rtpengine_answer() rewrites the SDP in the reply before forwarding it
# back toward the original offerer. The flags describe what the OFFERER
# expects.
#
# We pick the right flags by looking at the SOURCE of the reply (i.e.
# who answered the call):
#
#   - 200 OK from 127.0.0.1 → Asterisk answered → original offerer was a
#     browser (outbound call) → rewrite answer to WebRTC.
#   - 200 OK from anywhere else → a browser answered → original offerer
#     was Asterisk (inbound PSTN call) → rewrite answer to plain RTP.
#
# This is more reliable than tracking branch flags from request_route,
# which don't always survive into onreply_route in the way you'd hope.
onreply_route {
    if (status =~ "(180)|(183)|(2[0-9][0-9])") {
        if (nat_uac_test("19")) {
            fix_nated_contact();
        }
        if (has_body("application/sdp")) {
            if (src_ip == 127.0.0.1) {
                # Asterisk answered → offerer was browser → WebRTC out.
                rtpengine_answer("trust-address replace-origin replace-session-connection ICE=force RTP/SAVPF rtcp-mux-offer rtcp-mux-require DTLS=passive");
            } else {
                # Browser answered → offerer was Asterisk → plain RTP out.
                rtpengine_answer("trust-address replace-origin replace-session-connection RTP/AVP ICE=remove rtcp-mux-demux");
            }
        }
    }
    xlog("L_INFO", "Reply: $rs $rr from $si\n");
}

# ─── BYE/CANCEL: tell rtpengine to release media ───
event_route[tm:branch-failure] {
    rtpengine_delete();
}

# ─── WebSocket handshake ─────────────────────────────────
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade") {
        ws_handle_handshake();
        exit;
    }
    xhttp_reply("404", "Not Found", "text/plain", "Xyra Voice");
}
