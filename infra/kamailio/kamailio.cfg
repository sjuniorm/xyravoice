####### Xyra Voice — Kamailio (Step 2: Auth + Registration) ##########
#
# Connects to Supabase Postgres (read-only) to authenticate SIP users.
# DBURL is loaded from secrets/kamailio-db.cfg (gitignored).
#
########################################################################

# Load secret DBURL #!define from a separate file
import_file "/etc/kamailio/secrets/kamailio-db.cfg"

#!define MULTIDOMAIN 0
#!define WS_PORT 8088
#!define ASTERISK_IP "127.0.0.1"
#!define ASTERISK_PORT 5080

####### Global Parameters ##########

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=no
children=4

# Required for xhttp / WebSocket
tcp_accept_no_cl=yes
tcp_connection_lifetime=3604

# Listen on all interfaces
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tcp:0.0.0.0:8088   # Plain WebSocket — Nginx terminates TLS in front

####### Modules Section ##########

mpath="/usr/lib/kamailio/modules/"

# Core
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"

# Database (Postgres → Supabase)
loadmodule "db_postgres.so"

# Auth
loadmodule "auth.so"
loadmodule "auth_db.so"

# Registration / location
loadmodule "usrloc.so"
loadmodule "registrar.so"

# WebSocket / HTTP
loadmodule "xhttp.so"
loadmodule "websocket.so"

# NAT helpers
loadmodule "nathelper.so"

####### Module Parameters ##########

# Routing
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

# usrloc — keep registrations in memory only (DB-less)
modparam("usrloc", "db_mode", 0)

# registrar
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "default_expires", 3600)

# auth_db — point at our Supabase sip_users table
modparam("auth_db", "db_url", DBURL)
modparam("auth_db", "calculate_ha1", 1)            # Compute HA1 from plain password
modparam("auth_db", "use_domain", 0)               # Single SIP domain (no per-tenant subdomain yet)
modparam("auth_db", "user_column", "sip_username")
modparam("auth_db", "password_column", "sip_password")
modparam("auth_db", "load_credentials", "")        # Don't try to load extra columns

####### Routing Logic ##########

request_route {
    # ─── Sanity ───
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp\n");
        exit;
    }

    # ─── OPTIONS (health checks) ───
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "Xyra Voice — Kamailio Online");
        exit;
    }

    # ─── REGISTER ───
    if (is_method("REGISTER")) {
        # Authenticate against the sip_users table
        if (!auth_check("$fd", "sip_users", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }

        # Don't auth again on next requests in this dialog
        consume_credentials();

        # Save the contact in usrloc
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    # ─── INVITE / other in-dialog requests ───
    # For Step 2 we just authenticate and reply 501.
    # Step 3 will forward to Asterisk for actual call handling.
    if (is_method("INVITE|MESSAGE|SUBSCRIBE")) {
        if (!auth_check("$fd", "sip_users", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        consume_credentials();

        # TODO Step 3: forward to Asterisk
        # $du = "sip:" + ASTERISK_IP + ":" + ASTERISK_PORT;
        # route(RELAY);

        sl_send_reply("501", "Call routing not implemented yet (Step 3)");
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
    exit;
}

# ─── WebSocket handshake ─────────────────────────────────
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade") {
        ws_handle_handshake();
        exit;
    }
    xhttp_reply("404", "Not Found", "text/plain", "Xyra Voice");
}

onreply_route {
    xlog("L_INFO", "Reply: $rs $rr from $si\n");
}
