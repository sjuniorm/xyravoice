####### Xyra Voice — Kamailio (Step 1 minimal config) #######
#
# This is a SKELETON config — just enough to start cleanly.
# Step 2 will add: PostgreSQL auth, registration, routing to Asterisk.
#
##############################################################

#!define DBURL "postgres://placeholder@localhost:5432/placeholder"

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=4

# Listen on all interfaces, both UDP/TCP for SIP and WS for WebSocket
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tcp:0.0.0.0:8088   # Plain WebSocket — Nginx terminates TLS in front

####### Modules Section ##########

mpath="/usr/lib/kamailio/modules/"

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "nathelper.so"

# Module parameters
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)
modparam("xhttp", "event_callback", "xhttp:request")

####### Routing Logic ###########

request_route {
    # Sanity checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # Step 1: just respond OK to OPTIONS so we can test reachability
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "Xyra Voice — Kamailio Online");
        exit;
    }

    # Anything else: 501 not implemented (will be filled in Step 2)
    sl_send_reply("501", "Not Implemented (Step 1 skeleton)");
    exit;
}

# ─── Handle WebSocket upgrade requests from Nginx ─────────
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade") {
        ws_handle_handshake();
        exit;
    }
    xhttp_reply("404", "Not Found", "text/plain", "Xyra Voice");
}

onreply_route {
    xlog("L_INFO", "Reply: $rs $rr from $si\n");
}
