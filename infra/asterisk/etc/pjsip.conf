; ============================================================
; Xyra Voice — Asterisk PJSIP base config
;
; This file is hand-edited and rarely changes. Per-tenant trunk
; endpoints are generated by the xyra-sync agent into
;   /etc/asterisk/generated/pjsip_realtime.conf
; and #include'd at the bottom.
; ============================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5080


; ─── kamailio-out: bidirectional bridge endpoint to Kamailio ──
; Two roles:
;   1. Outbound dial target — used by [from-trunk] in the dialplan
;      to forward inbound PSTN calls to Kamailio.
;   2. Inbound endpoint — INVITEs from Kamailio (browser-initiated
;      outbound calls heading for a trunk) match here via `identify`,
;      so they land in [from-kamailio] which routes them to the right
;      tenant trunk.
[kamailio-out]
type=endpoint
transport=transport-udp
context=from-kamailio
disallow=all
allow=alaw
allow=ulaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
aors=kamailio-out

[kamailio-out]
type=aor
contact=sip:127.0.0.1:5060

[kamailio-out]
type=identify
endpoint=kamailio-out
match=127.0.0.1


; ─── Generated trunks (managed by xyra-sync) ────────────────
#include "/etc/asterisk/generated/pjsip_realtime.conf"
