; ============================================================
; Step 1: Asterisk PJSIP minimal config
; Listens on port 5080 to receive calls forwarded from Kamailio
; (Kamailio is on 5060). Step 2 will add real endpoints + trunks.
; ============================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5080
