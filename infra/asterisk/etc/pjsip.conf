; ============================================================
; Xyra Voice — Asterisk PJSIP base config
;
; This file is hand-edited and rarely changes. Per-tenant trunk
; endpoints are generated by the xyra-sync agent into
;   /etc/asterisk/generated/pjsip_realtime.conf
; and #include'd at the bottom.
; ============================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5080

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5080


; ─── kamailio-out: outbound trunk back to Kamailio ──────────
; Used by [from-trunk] in the dialplan to forward inbound PSTN
; calls to the Kamailio proxy, which then routes them to the
; registered browser based on the dialed extension's SIP username.
[kamailio-out]
type=endpoint
transport=transport-udp
context=from-asterisk
disallow=all
allow=alaw
allow=ulaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
aors=kamailio-out

[kamailio-out]
type=aor
contact=sip:127.0.0.1:5060

[kamailio-out]
type=identify
endpoint=kamailio-out
match=127.0.0.1


; ─── Generated trunks (managed by xyra-sync) ────────────────
#include "/etc/asterisk/generated/pjsip_realtime.conf"
