; ============================================================
; Xyra Voice — Asterisk dialplan base
;
; Hand-edited base contexts. Per-tenant outbound + inbound DID
; routing is generated by xyra-sync into
;   /etc/asterisk/generated/extensions_realtime.conf
; and #include'd at the bottom.
; ============================================================

[general]
static=yes
writeprotect=no

[globals]

; ─── Default catch-all (should never hit) ───────────────────
[default]
exten => _X.,1,NoOp(Unrouted call to ${EXTEN})
 same => n,Hangup(1)


; ─── from-asterisk: bounces from kamailio-out endpoint ──────
; Kamailio sends inbound calls back to itself; this context just
; relays through to Kamailio. Defined as a passthrough so the
; kamailio-out endpoint has somewhere to land.
[from-asterisk]
exten => _X.,1,NoOp(from-asterisk: ${EXTEN})
 same => n,Hangup()


; ─── Generated contexts (managed by xyra-sync) ──────────────
; Provides:
;   [from-kamailio]   — outbound calls from browser softphones
;   [from-trunk]      — inbound calls from PSTN trunks
#include "/etc/asterisk/generated/extensions_realtime.conf"
