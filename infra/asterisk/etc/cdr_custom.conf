; ============================================================
; Xyra Voice — Custom CDR output
;
; Writes one CSV line per completed call to Master.csv.
; The sync agent tails this file and pushes rows to Supabase.
;
; Fields (in order):
;   uniqueid, clid, src, dst, dcontext, channel, dstchannel,
;   lastapp, lastdata, start, answer, end, duration, billsec,
;   disposition, userfield
; ============================================================

[mappings]
Master.csv => ${CDR(uniqueid)},${CDR(clid)},${CDR(src)},${CDR(dst)},${CDR(dcontext)},${CDR(channel)},${CDR(dstchannel)},${CDR(lastapp)},${CDR(lastdata)},${CDR(start)},${CDR(answer)},${CDR(end)},${CDR(duration)},${CDR(billsec)},${CDR(disposition)},${CDR(userfield)}
