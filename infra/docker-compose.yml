# ============================================================
# Xyra Voice — SIP Infrastructure
# Runs on: Hetzner CX23 (Ubuntu 22.04/24.04)
# Services: Kamailio (SIP proxy) + rtpengine (WebRTC media relay)
#           + Asterisk (PBX/media for trunks) + Nginx (TLS for WSS)
# ============================================================

services:
  # ─── Kamailio: SIP proxy + WebSocket gateway ───────────────
  kamailio:
    image: ghcr.io/kamailio/kamailio-ci:master
    container_name: xyra-kamailio
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./kamailio:/etc/kamailio:rw
      - ./logs/kamailio:/var/log/kamailio:rw
    command: ["-f", "/etc/kamailio/kamailio.cfg"]
    depends_on:
      - rtpengine
      - asterisk

  # ─── rtpengine: WebRTC ↔ RTP media relay ──────────────────
  # Bridges browser DTLS-SRTP to plain RTP and vice versa.
  # Required for browser-based softphones to make calls.
  rtpengine:
    image: drachtio/rtpengine:latest
    container_name: xyra-rtpengine
    restart: unless-stopped
    network_mode: host
    # The drachtio entrypoint runs sed on /etc/rtpengine.conf to substitute
    # MY_IP, so the file must be writable. We mount the whole dir.
    volumes:
      - ./rtpengine:/etc/rtpengine-host:ro
    # Override entrypoint: copy our config in, then exec rtpengine directly
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cp /etc/rtpengine-host/rtpengine.conf /etc/rtpengine.conf
        exec rtpengine --config-file /etc/rtpengine.conf

  # ─── Asterisk: PBX engine for trunk routing ───────────────
  # Handles external calls (PSTN via SIP trunks). Step 4.
  # For Step 3 (ext-to-ext), Kamailio routes directly.
  asterisk:
    image: mlan/asterisk:latest
    container_name: xyra-asterisk
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./asterisk/etc:/etc/asterisk:rw
      - ./asterisk/sounds:/var/lib/asterisk/sounds/custom:rw
      - ./logs/asterisk:/var/log/asterisk:rw

  # ─── Nginx: TLS termination for WSS (browser softphones) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: xyra-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx:rw
    depends_on:
      - kamailio
